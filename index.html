<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Self-development curriculum</title>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial,sans-serif;
      color:white;
      min-height:100vh;

      background:
      url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format&fit=crop')
      center/cover fixed;
    }

    .overlay{
      background:rgba(0,0,0,0.65);
      min-height:100vh;
      padding:20px;
    }

    h1{
      text-align:center;
      font-size:2.2rem;
      margin-bottom:10px;
    }

    .date{
      text-align:center;
      margin-bottom:20px;
      font-size:1rem;
    }

    .card{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(8px);

      border-radius:18px;

      padding:20px;
      margin:15px auto;

      max-width:900px;

      box-shadow:0 8px 30px rgba(0,0,0,0.25);
    }

    input,
    textarea,
    button{
      width:100%;
      padding:12px;
      margin:8px 0;

      border:none;
      border-radius:10px;

      font-size:1rem;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    button{
      cursor:pointer;
      background:#6c63ff;
      color:white;
    }

    button:hover{
      opacity:.9;
    }

    .task-item{
      display:flex;
      align-items:center;
      gap:10px;
      margin:10px 0;
    }

    .task-item span{
      flex:1;
    }

    .task-item input[type='checkbox']{
      width:auto;
      transform:scale(1.3);
    }

    .small-btn{
      width:auto;
      padding:6px 10px;
      background:#ff5c5c;
    }

    .secondary-btn{
      background:#4caf50;
    }

    .source-btn{
      background:#2196f3;
      width:auto;
      padding:8px 14px;
      margin-top:10px;
    }

    .study-block{
      background:rgba(255,255,255,0.08);
      border-radius:14px;
      padding:16px;
      margin-top:18px;
    }

    .study-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .study-title{
      font-size:1.05rem;
      font-weight:bold;
    }

    .source-item{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .source-item input{
      flex:1;
      min-width:220px;
    }

    .source-link{
      display:inline-block;
      margin-top:4px;
      color:#9ad1ff;
      text-decoration:underline;
      word-break:break-all;
      font-size:.95rem;
    }

    .source-link:hover{
      color:#ffffff;
    }

    .celebrate{
      display:none;

      text-align:center;
      font-size:2rem;
      font-weight:bold;

      animation:rainbow 1s infinite;

      margin:20px auto;
      max-width:900px;
    }

    @keyframes rainbow{

      0%{
        color:#ff0000;
        transform:scale(1);
      }

      25%{
        color:#ffff00;
        transform:scale(1.05);
      }

      50%{
        color:#00ff00;
        transform:scale(1.1);
      }

      75%{
        color:#00ffff;
        transform:scale(1.05);
      }

      100%{
        color:#ff00ff;
        transform:scale(1);
      }

    }

  </style>
</head>

<body>

<div class="overlay">

  <h1>Self-development curriculum</h1>

  <div class="date" id="today"></div>

  <div class="card">

    <h2>Xem dữ liệu ngày khác</h2>

    <input
      type="date"
      id="historyDate"
      onchange="loadHistory(this.value)"
    />

  </div>

  <div class="card">

    <h2>Daily Habit (lặp lại mỗi ngày)</h2>

    <input
      id="habitInput"
      placeholder="Nhập habit mới..."
    />

    <button onclick="addHabit()">
      + Thêm habit
    </button>

    <div id="habitList"></div>

  </div>

  <div class="card">

    <h2>Task phát sinh hôm nay</h2>

    <input
      id="taskInput"
      placeholder="Nhập task phát sinh..."
    />

    <button onclick="addTask()">
      + Thêm task
    </button>

    <div id="taskList"></div>

  </div>

  <div class="celebrate" id="celebrateMsg">

    🎉 BẠN ĐÃ ĐẠT 80% HIỆU SUẤT TRONG NGÀY.
    BẠN THẬT GIỎI.
    NGÀY HÔM NAY CỦA BẠN THẬT NĂNG SUẤT.
    HÃY DUY TRÌ NHÉ! 🎉

  </div>

  <div class="card">

    <h2>Nay mình học gì</h2>

    <div id="studyContainer"></div>

    <button
      class="secondary-btn"
      onclick="addStudyBlock()"
    >
      + Thêm phần học mới
    </button>

  </div>

  <div class="card">

    <h2>Nay mình đọc sách gì</h2>

    <textarea
      id="bookRead"
      placeholder="Sách hôm nay..."
    ></textarea>

  </div>

  <div class="card">

    <h2>Note / Áp dụng những gì mình học</h2>

    <textarea
      id="notes"
      placeholder="Ghi chú..."
    ></textarea>

  </div>

</div>

<script>

const VN = 'Asia/Ho_Chi_Minh';

const API_URL =
'https://script.google.com/macros/s/AKfycbxux3NlNXTYKgxI7fybDTemPxN4thuEFsgnOaJ_Gyz2smdiqhrtHjBDcmwApXmqX1w/exec';

function getTodayKey(){

  return new Intl.DateTimeFormat(
    'en-CA',
    {
      timeZone:VN
    }
  ).format(new Date());

}

function nowVN(){

  return new Date().toLocaleString(
    'vi-VN',
    {
      timeZone:VN
    }
  );

}

let habits = [];
let daily = {};

const today = getTodayKey();

let selectedDate = today;

function createStudyBlock(){

  return {
    topic:'',
    sources:[
      ''
    ]
  };

}

function createEmptyDay(){

  return {
    tasks:[],
    checked:{},

    studyItems:[
      createStudyBlock()
    ],

    bookRead:'',
    notes:''
  };

}

function ensureDate(date){

  if(!daily[date]){

    daily[date] = createEmptyDay();

  }

  if(!daily[date].studyItems){

    daily[date].studyItems = [
      createStudyBlock()
    ];

  }

}

function saveLocal(){

  localStorage.setItem(
    'habits',
    JSON.stringify(habits)
  );

  localStorage.setItem(
    'dailyData',
    JSON.stringify(daily)
  );

}

async function cloudSave(){

  try{

    await fetch(API_URL,{

     method:'POST',

     headers:{
      'Content-Type':'application/json'
     },

     body:JSON.stringify({
     habits,
     daily
    })

});

  }catch(err){

    console.log(err);

  }

}

async function save(){

  saveLocal();

  await cloudSave();

  render();

}

function addHabit(){

  const v =
    document
    .getElementById('habitInput')
    .value
    .trim();

  if(!v) return;

  habits.push(v);

  document.getElementById(
    'habitInput'
  ).value='';

  save();

}

function addTask(){

  ensureDate(selectedDate);

  const v =
    document
    .getElementById('taskInput')
    .value
    .trim();

  if(!v) return;

  daily[selectedDate].tasks.push(v);

  document.getElementById(
    'taskInput'
  ).value='';

  save();

}

function toggle(key){

  ensureDate(selectedDate);

  daily[selectedDate].checked[key] =
  !daily[selectedDate].checked[key];

  save();

}

function removeTask(i){

  ensureDate(selectedDate);

  daily[selectedDate].tasks.splice(i,1);

  save();

}

function removeHabit(i){

  habits.splice(i,1);

  save();

}

function addStudyBlock(){

  ensureDate(selectedDate);

  daily[selectedDate].studyItems.push(
    createStudyBlock()
  );

  save();

}

function removeStudyBlock(index){

  ensureDate(selectedDate);

  if(
    daily[selectedDate].studyItems.length === 1
  ){
    return;
  }

  daily[selectedDate].studyItems.splice(index,1);

  save();

}

function addSource(studyIndex){

  ensureDate(selectedDate);

  daily[selectedDate]
  .studyItems[studyIndex]
  .sources.push('');

  save();

}

function removeSource(studyIndex,sourceIndex){

  ensureDate(selectedDate);

  const sources =
    daily[selectedDate]
    .studyItems[studyIndex]
    .sources;

  if(sources.length === 1){
    return;
  }

  sources.splice(sourceIndex,1);

  save();

}

async function updateStudyTopic(index,value){

  ensureDate(selectedDate);

  daily[selectedDate]
  .studyItems[index]
  .topic = value;

  saveLocal();
  await cloudSave();

}

async function updateSources(
  studyIndex,
  sourceIndex,
  value
){

  ensureDate(selectedDate);

  daily[selectedDate]
  .studyItems[studyIndex]
  .sources[sourceIndex] = value;

  saveLocal();
  await cloudSave();

}

function loadHistory(date){

  selectedDate = date || today;

  ensureDate(selectedDate);

  render();

}

function formatUrl(url){

  if(!url) return '';

  if(
    url.startsWith('http://')
    ||
    url.startsWith('https://')
  ){
    return url;
  }

  return 'https://' + url;

}

function renderStudyItems(){

  const container =
    document.getElementById(
      'studyContainer'
    );

  container.innerHTML = '';

  daily[selectedDate]
  .studyItems
  .forEach((item,studyIndex)=>{

    let sourcesHtml = '';

    item.sources.forEach(
      (source,sourceIndex)=>{

      const finalUrl =
        formatUrl(source);

      sourcesHtml += `

        <div class="source-item">

          <input
            placeholder="Nguồn học ở đâu..."
            value="${source.replace(/"/g,'&quot;')}"
            oninput="
              updateSource(
                ${studyIndex},
                ${sourceIndex},
                this.value
              )
            "
          />

          <button
            class="small-btn"
            onclick="
              removeSource(
                ${studyIndex},
                ${sourceIndex}
              )
            "
          >
            X
          </button>

        </div>

        ${
          source.trim()
          ? `
            <a
              class="source-link"
              href="${finalUrl}"
              target="_blank"
            >
              🔗 ${source}
            </a>
          `
          : ''
        }

      `;

    });

    container.innerHTML += `

      <div class="study-block">

        <div class="study-header">

          <div class="study-title">
            Nội dung học #${studyIndex + 1}
          </div>

          <button
            class="small-btn"
            onclick="
              removeStudyBlock(
                ${studyIndex}
              )
            "
          >
            Xóa
          </button>

        </div>

        <textarea
          placeholder="Hôm nay học gì..."
          oninput="
            updateStudyTopic(
              ${studyIndex},
              this.value
            )
          "
        >${item.topic}</textarea>

        ${sourcesHtml}

        <button
          class="source-btn"
          onclick="
            addSource(
              ${studyIndex}
            )
          "
        >
          + Thêm nguồn học
        </button>

      </div>

    `;

  });

}

function render(){

  ensureDate(selectedDate);

  document.getElementById(
    'historyDate'
  ).value = selectedDate;

  let total = 0;
  let done = 0;

  const h =
    document.getElementById(
      'habitList'
    );

  h.innerHTML='';

  habits.forEach((x,i)=>{

    const k = 'habit_'+i;

    total++;

    if(
      daily[selectedDate]
      .checked[k]
    ){
      done++;
    }

    h.innerHTML += `

      <div class='task-item'>

        <input
          type='checkbox'
          ${
            daily[selectedDate]
            .checked[k]
            ? 'checked'
            : ''
          }
          onchange='toggle("${k}")'
        >

        <span>${x}</span>

        <button
          class='small-btn'
          onclick='removeHabit(${i})'
        >
          X
        </button>

      </div>

    `;

  });

  const t =
    document.getElementById(
      'taskList'
    );

  t.innerHTML='';

  daily[selectedDate]
  .tasks
  .forEach((x,i)=>{

    const k = 'task_'+i;

    total++;

    if(
      daily[selectedDate]
      .checked[k]
    ){
      done++;
    }

    t.innerHTML += `

      <div class='task-item'>

        <input
          type='checkbox'
          ${
            daily[selectedDate]
            .checked[k]
            ? 'checked'
            : ''
          }
          onchange='toggle("${k}")'
        >

        <span>${x}</span>

        <button
          class='small-btn'
          onclick='removeTask(${i})'
        >
          X
        </button>

      </div>

    `;

  });

  renderStudyItems();

  document.getElementById(
    'bookRead'
  ).value =
  daily[selectedDate]
  .bookRead || '';

  document.getElementById(
    'notes'
  ).value =
  daily[selectedDate]
  .notes || '';

  const rate =
    total
    ? done / total
    : 0;

  document.getElementById(
    'celebrateMsg'
  ).style.display =

    rate >= 0.8
    ? 'block'
    : 'none';

}

document.addEventListener(
  'input',
  e=>{

    ensureDate(selectedDate);

    if(
      e.target.id === 'bookRead'
    ){

      daily[selectedDate]
      .bookRead = e.target.value;

      saveLocal();
      cloudSave();

    }

    if(
      e.target.id === 'notes'
    ){

      daily[selectedDate]
      .notes = e.target.value;

      saveLocal();
      cloudSave();

    }

  }
);

async function cloudLoad(){

  try{

    const res =
     await fetch(
      API_URL + '?t=' + Date.now()
     );

    const text =
      await res.text();

    if(text){

      const data =
        JSON.parse(text);

      habits =
        data.habits || [];

      daily =
        data.daily || {};

    }

  }catch(err){

    console.log(err);

    habits =
      JSON.parse(
        localStorage.getItem(
          'habits'
        ) || '[]'
      );

    daily =
      JSON.parse(
        localStorage.getItem(
          'dailyData'
        ) || '{}'
      );

  }

  ensureDate(selectedDate);

  render();

}

cloudLoad();

setInterval(()=>{

  document.getElementById(
    'today'
  ).innerText =

    'Giờ Việt Nam: '
    + nowVN()
    + ' | Đang xem dữ liệu ngày: '
    + selectedDate;

},1000);

</script>

</body>
</html>
